  main { display:grid; grid-template-columns: minmax(0, 1fr) 480px; height: calc(100vh - 100px); }

  #filters {

    margin-bottom: 12px; padding: 10px 12px; background: var(--bg2);

  #filters input[type=search] {

  }
  #filters select, #filters button {
    background: var(--bg3); border:1px solid var(--border); color:var(--fg);
    padding: 6px 10px; border-radius: 4px; font: inherit; cursor:pointer;
  }
  #filters .chip {
    padding: 3px 8px; border-radius: 3px; font-size: 11px;
    border: 1px solid var(--border); cursor:pointer; user-select:none;
  }
  #filters .chip.on { background: var(--bg3); border-color: var(--accent); color: var(--fg); }
  #filters .chip.off { color: var(--muted); }
  table.records { width:100%; border-collapse: collapse; font-size: 12px; }
  table.records th, table.records td {
    text-align:left; padding: 6px 8px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  table.records th { color: var(--muted); font-weight: 500; cursor:pointer; user-select:none; }
  table.records tr { cursor: pointer; }
  table.records tr:hover { background: var(--bg2); }
  table.records tr.selected { background: var(--bg3); }
  .badge {
    display:inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .badge.pdf { background: rgba(76,194,255,0.16); color: var(--pdf); }
  .badge.video { background: rgba(255,184,76,0.16); color: var(--video); }
  .badge.image { background: rgba(179,133,255,0.16); color: var(--image); }
  .badge.redact { background: rgba(255,92,92,0.16); color: var(--redact); }
  .badge.agency { background: var(--bg3); color: var(--fg); }
  #detail h2 { margin:0 0 6px 0; font-size: 16px; }
  #detail .id { color: var(--muted); font-size: 11px; margin-bottom: 10px; }
  #detail .summary {
    border-left: 3px solid var(--accent); background: var(--bg3);
    padding: 8px 12px; margin: 10px 0; font-size: 12px; color: var(--fg);
  }
  #detail .meta-grid {
    display: grid; grid-template-columns: 110px 1fr; gap: 4px 12px;
    font-size: 12px; margin: 8px 0;
  }
  #detail .meta-grid dt { color: var(--muted); }
  #detail .meta-grid dd { margin:0; word-break:break-word; }

  #graph .node.video { fill: var(--video); }
  #graph .node.image { fill: var(--image); }
  #graph .node.selected { stroke: var(--fg); stroke-width: 2.5; }
  #graph .link { stroke: var(--border); stroke-width: 1.2; }

  #timeline .row .marker.image { background: var(--image); }
  #timeline .row .title { flex: 1; cursor: pointer; }
  #timeline .row:hover { background: var(--bg2); }
  #timeline .row.selected { background: var(--bg3); }
  #timeline h3 { margin: 18px 0 4px; font-size: 13px; color: var(--accent); }

  #locations h3 { margin: 16px 0 4px; font-size: 13px; }
  #locations h3 .count { color: var(--muted); font-weight:400; font-size: 11px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }
  /* ---- Patterns view ---- */
  #view.patterns { padding: 12px 16px; }
  .pat-section { margin-bottom: 22px; }

    border-left: 3px solid var(--accent2); border-radius: 5px; padding: 12px 14px; }

  .pat-finding p { margin: 0 0 8px; font-size: 12px; color: var(--fg); }

  .globe-time .gt-track input[type=range]::-moz-range-thumb {

  .globe-time .gt-unknown { display: flex; gap: 4px; align-items: center; cursor: pointer; user-select: none; }
  .globe-time .gt-unknown input { margin: 0; }
  /* When the slider exists, scoot the legend up so they don't overlap */
  #view.globe .globe-legend { bottom: 92px; }

 or significance.","redaction":"TRUE","source_url":"https://www.war.gov/medialink/ufo/release_1/fbi-photo-b9.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/fbi-photo-b9.jpg","bytes":588086,"sha256":"e61a49212bb82cfc9a6e7627a2291c9159bbbb2272fb995e45411a48e44eb0b1","extracted_text_path":"extracted/fbi-052-fbi-photo-b9.md","year":2025,"ents":{"military_units":["AARO","FBI"],"classification":[],"us_states":[],"aircraft":[],"operations":[],"case_numbers":[],"names":["Narrative Description","President Trump"],"mgrs":[]}},{"id":"fbi-053-usper-statement-about-uap-sighting","type":"pdf","title":"USPER Statement about UAP Sighting","agency":"FBI","agency_raw":"FBI","release_date":"5/8/26","incident_date":"Late 2025","incident_date_inferred":"","incident_date_inferred_source":"","incident_date_inferred_csv_disagrees":false,"incident_location":"United States","incident_location_inferred":"","incident_location_inferred_source":"","incident_location_inferred_csv_disagrees":false,"summary":"This is an FBI 302 interview conducted with a senior US intelligence official regarding his first-hand account of a UAP encounter at a US military facility. USPER relayed to FBI agents that he and other federal and state personnel conducted searches to where orbs had been previously seen.  After searching the area with a helicopter, they found a “super-hot” orb hovering over the ground.  The orb is reported to have travelled for 20 miles at a speed too fast for the helicopter in pursuit.  An additional “swarm” of lights were seen moving in all directions.  A total of four or five additional orbs were seen shortly thereafter for a short time, flaring up and then down.  This pattern of four or five orbs flaring up, then down continued over the next thirty minutes across the area.","redaction":"TRUE","source_url":"https://www.war.gov/medialink/ufo/release_1/usper-statement-redacted.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/usper-s cident_date_inferred_source":"csv+title","incident_date_inferred_csv_disagrees":false,"incident_location":"Low Earth Orbit","incident_location_inferred":"","incident_location_inferred_source":"","incident_location_inferred_csv_disagrees":false,"summary":"Gemini 7 was the tenth crewed American spaceflight. This document is a transcript of communications between the flight crew, Astronauts James “Jim” Lovell and Frank Borman, and the Manned Flight Center (now known as Johnson Space Center) in Houston, Texas. The transcript begins with Borman’s report of a “bogey,” contemporary nomenclature for an unknown aircraft, as well as a debris field. Borman described the debris field as consisting of “very, very many […] hundreds of little particles.” He estimated the particles’ distance from the spacecraft to be four miles. Lovell described observing a “brilliant body in the sun against a black background with trillions of particles on it.”\nThis document also includes handwritten notes documenting the encounter, annotated with the phrase “UFO Sighting by Borman” in the top right corner.","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/255_t_763_r1b_transcripts.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/255_t_763_r1b_transcripts.jpg","bytes":328211,"sha256":"73cb8f0dc879a38811d9d745c11771263e112ec12a0e6bbabc27b9f781ddb74b","extracted_text_path":"extracted/nasa-002-nasa-uap-d3-gemini-7-transcript-1965.md","year":1965,"ents":{"military_units":[],"classification":[],"us_states":["Texas"],"aircraft":[],"operations":[],"case_numbers":[],"names":["Astronauts James","Frank Borman","Manned Flight Center","Johnson Space Center","Low Earth Orbit","Ure Goan"],"mgrs":[]}},{"id":"nasa-003-nasa-uap-d3a-gemini-7-audio-excerpt-1965","type":"video","title":"NASA-UAP-D3A, Gemini 7 Audio Excerpt, 1965","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"12/5/65","incident_date_inferred":"1965-12-05","incident_date_inferred_source":"body+csv+summary","incident_date_inferred_csv_disagrees":false,"incident_location":"Low Earth Orbit","incident_location_inferred":"Low Earth Orbit","incident_location_inferred_source":"body+csv","incident_location_inferred_csv_disagrees":false,"summary":"This audio recording contains air to ground communications and the NASA Public Affairs audio feed with commentary, recorded during the flight of the Gemini 7 mission. In this excerpted segment of audio, Astronaut Frank Borman reports to NASA mission control in Houston his sighting of an unidentified object, which he referred to as a \"bogey.\" This sighting occurred on December 5, 1965. The dialogue includes Borman's initial report, as well as additional comments by Astronaut Jim Lovell, Borman's fellow crew member.","redaction":"","source_url":"https://d34w7g4gy10iej.cloudfront.net/video/2605/DOD_111689232/DOD_111689232-1920x1080-6000k.mp4","modal_image_url":"","bytes":17985081,"sha256":"f0e27641c21c23c93854d58ccf3769e599482892c219b418d0515467270bed93","extracted_text_path":"extracted/nasa-003-nasa-uap-d3a-gemini-7-audio-excerpt-1965.md","year":1965,"ents":{"military_units":[],"classification":[],"us_states":[],"aircraft":[],"operations":[],"case_numbers":[],"names":["Audio Excerpt","Low Earth Orbit","Public Affairs","Astronaut Frank Borman","Astronaut Jim Lovell","Low Earth"],"mgrs":[]}},{"id":"nasa-004-nasa-uap-d1-apollo-12-transcript-1969","type":"pdf","title":"NASA-UAP-D1, Apollo 12 Transcript, 1969","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1969","incident_date_inferred":"1969","incident_date_inferred_source":"csv+summary+title","incident_date_inferred_csv_disagrees":false,"incident_location":"Moon","incident_location_inferred":"Moon","incident_location_inferred_source":"body+csv+summary","incident_location_inferred_csv_disagrees":false,"summary":"Apollo 12 was the fourth crewed U.S. mission to the Moon and the second to land astronauts on the lunar surface. This document is an excerpt from the Apollo 12 Technical Air-to-Ground Voice Transcription, November 1969, highlighting two periods in which astronauts reported observing unidentified phenomenon: a one hour period on the fifth day, and a two minute period on the sixth day. These transcripts contain contemporaneous observations by the flight crew reacting to unidentified phenomenon.\n•\tDay 05, Hour 19, Minute 14, Second 58 through Day 05, Hour 20, Minute 12, Second 14:\no\tAt 05:19:27:25, the pilot of the Lunar Module (LMP-LM), Astronaut Alan L. Bean, described observing particles and flashes of light “sailing off in space” via the onboard Alignment Optical Telescope (AOT). He characterized these phenomenon as “escaping the Moon.”\n•\tDay 06, Hour 00, Minute 21, Second 42 through Day 06, Hour 00, Minute 23, Second 33:\no\tMission Commander, Charles “Pete” Conrad, described observing floating debris outside the lunar module, which had been illuminated by the module’s onboard tracking light. At 06:00:21:51, Conrad assessed that the tracking light had burnt out because he could no longer see the debris from the module.","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-d1-apollo-12-transcript-1969.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-d1-apollo-12-transcript-1969.jpg","bytes":1030644,"sha256":"ab911622b7d4203d9d54914f03d1662cf561b7f943afe9d17f9617cfaea06585","extracted_text_path":"extracted/nasa-004-nasa-uap-d1-apollo-12-transcript-1969.md","year":1969,"ents":{"military_units":[],"classification":[],"us_states":[],"aircraft":[],"operations":[],"case_numbers":[],"names":["Ground Voice Transcription","Lunar Module","Astronaut Alan","Alignment Optical Telescope","Yankee Clipper","And Jerry"],"mgrs":[]}},{"id":"nasa-005-nasa-uap-d2-apollo-17-transcript-1972","type":"pdf","title":"NASA-UAP-D2, Apollo 17 Transcript, 1972","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1972","incident_date_inferred":"1972","incident_date_inferred_source":"csv+summary+title","incident_date_inferred_csv_disagrees":false,"incident_location":"Moon","incident_location_inferred":"Moon","incident_location_inferred_source":"body+csv+summary","incident_location_inferred_csv_disagrees":false,"summary":"Apollo 17 was the ninth crewed U.S. mission to the Moon, and the sixth to land astronauts on the lunar surface. This document is an excerpt from the Apollo 17 Technical Air-to-Ground Voice Transcription, December 1972, highlighting three periods in which astronauts reported observing unidentified phenomenon: a nine minute period on the first day, a three hour period on the second day, and a six minute period on the third day. \n•\tDay 00, Hour 03, Minute 34, Second 10 through Day 00, Hour 03, Minute 42, Second 29:\n    o\tCommand Module Pilot (CMP), Ronald Evans, reported observing “very bright particles or fragments” drifting and “tumbling” near the spacecraft as it maneuvered. Lunar Module Pilot (LMP), Harrison “Jack” Schmitt, described the phenomenon as looking “like the Fourth of July.” The astronauts speculated that the phenomenon may be attributable to ice or paint fragments dislodging from a separated component of the spacecraft (S-IVB) but characterized that assessment as a “wild guess.”\n•\tDay 02, Hour 18, Minute 42, Second 34 through Day 02, Hour 21, Minute 07, Second 05:\n    o\tMission Commander, Eugene A. Cernan, reported difficulty sleeping and described having observed “some sets of the streaks.” He also described an intense light flashing between his eyes, describing its intensity as comparable to that of a train headlight and characterizing it as “imposing.” Over the next three hours, Cernan described observing several flashing, rotating phenomenon that he assessed as corresponding to physical objects in space rather than a purely optical phenomenon. LMP Schmitt also reported observing similar phenomenon, though he again assessed the source of his observation to be a separated rocket stage (S-IVB). At 02:20:55:22, Cernan reported observing two additional distant flashing objects, though he assessed them as Spacecraft/Lunar Module Adapter panels (SLA panel), another separated component of the Saturn V rocket.\n•\tDay 03, Hour 15, Minute 33, Second 25 through Day 03, Hour 15, Minute 39, Second 46:\n    o\tAt 03:15:38:09, LMP Schmitt exclaimed that he had observed a flash on the lunar surface north of Grimaldi (crater).","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-d2-apollo-17-transcript-1972.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-d2-apollo-17-transcript-1972.jpg","bytes":463669,"sha256":"9d041c8799a0124dc440c05cacd790a43d9e063e399aaa5cd3ee777b14146d03","extracted_text_path":"extracted/nasa-005-nasa-uap-d2-apollo-17-transcript-1972.md","year":1972,"ents":{"military_units":[],"classification":[],"us_states":["Hawaii"],"aircraft":[],"operations":[],"case_numbers":[],"names":["Ground Voice Transcription","Ronald Evans","Lunar Module Pilot","Eugene A. Cernan","Lunar Module Adapter","The Cowboys","Flight Plan","Solomon Islands","New Zealand","Baby Ben","El Lago","Hawaiian Islands","The Solomon Islands","Oceanus Procellarum","Rima Gamma","Mare Marginis","Mare Crisium"],"mgrs":[]}},{"id":"nasa-006-nasa-uap-d4-apollo-11-technical-crew-debriefing-1969","type":"pdf","title":"NASA-UAP-D4, Apollo 11 Technical Crew Debriefing, 1969","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1969","incident_date_inferred":"1969-07-31","incident_date_inferred_source":"body+summary","incident_date_inferred_csv_disagrees":true,"incident_location":"N/A","incident_location_inferred":"Moon","incident_location_inferred_source":"body+summary","incident_location_inferred_csv_disagrees":false,"summary":"Apollo 11 was the third crewed mission to the Moon and the first to land Astronauts on the lunar surface. This document is an excerpt from the Apollo 11 Technical Crew Debriefing (Volumes 1 and 2) from July 31, 1969. The document highlights three observations: one, an object on the way out to the Moon; two, flashes of light inside the cabin; and three, a sighting on the return trip of a bright light tentatively assumed by the crew to be a laser.\n\n•\tPage 6-33 (Vol. 1). [Lunar Module Pilot for Apollo 11, Buzz Aldrin]: “The first unusual thing that we saw I guess was 1 day out or something pretty close to the moon. It had a sizeable dimension to it, so we put the monocular on it.” The crew speculated that it could have been the S-IVB stage of the Saturn V launch vehicle.\n•\tPage 6-37 (Vol. 1). [Lunar Module Pilot for Apollo 11, Buzz Aldrin] “The other observation that I made accumulated gradually. I don’t know whether I saw it the first night, but I’m sure I saw it the second night. I was trying to go to sleep with all the lights out. I observed what I thought were little flashes inside the cabin, spaced a couple of minutes apart…”\n•\tPage 21-1 (Vol. 2). [Lunar Module Pilot for Apollo 11, Buzz Aldrin] “I observed what appeared to be a fairly bright light source which we tentatively ascribed to a possible laser.”","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-d4-apollo-11-technical-crew-debriefing-1969.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-d4-apollo-11-technical-crew-debriefing-1969.jpg","bytes":29286242,"sha256":"aacc41814dd16583bbeabe068026bf286cd9b0e464ff097c5c7b97b00d308443","extracted_text_path":"extracted/nasa-006-nasa-uap-d4-apollo-11-technical-crew-debriefing-1969.md","year":1969,"ents":{"military_units":[],"classification":[],"us_states":[],"aircraft":[],"operations":[],"case_numbers":[],"names":["Technical Crew Debriefing","Lunar Module Pilot","Buzz Aldrin","Policy Directive","Visual Sightings","The Earth"],"mgrs":[]}},{"id":"nasa-007-nasa-uap-d5-apollo-17-crew-debriefing-for-science-1973","type":"pdf","title":"NASA-UAP-D5, Apollo 17 Crew Debriefing for Science, 1973","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1973","incident_date_inferred":"1973-01-08","incident_date_inferred_source":"body+summary","incident_date_inferred_csv_disagrees":true,"incident_location":"N/A","incident_location_inferred":"","incident_location_inferred_source":"","incident_location_inferred_csv_disagrees":false,"summary":"Apollo 17 was the ninth crewed U.S. mission to the Moon, and the sixth to land Astronauts on the lunar surface. This document is an excerpt from the Apollo 17 Crew Debriefing for Science on January 8, 1973, in which Dick Henry, co-investigator on the ultraviolet experiment on Apollo 17, discusses seeing results that were unexpected. \n•\tPages 119-120. “One of the most exciting results of X-ray astronomy was the fact that an X-ray background was observed over the sky that nobody had expected, and part of this is the gamma-ray background that Dr. Trombka talked about. In the UV, nobody knows, but you never know until you look. You do have to deal with this background of stars that we know is there. So, we did look at a large number of different points at high galactic latitudes, both north and south. The spectrum that we see is above this dark count. In other words, this abnormally high dark current did not, in fact, interfere with that experiment. The spectrum that we see looks like the spectrum of the hot star; however, we know that there were no hot stars within our field of view. Therefore, the most conservative interpretation, I think, is that what we're seeing is light from hot stars in the galactic plane going up out of the plane and reflecting off interstellar dust. There are certain characteristics of the spectrum, though, that don't fit that theory, and it's at least possible that this is extragalactic radiation. I'm looking forward very much to the detailed computer study of this, but it's going to take a long time.”","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-d5-apollo-17-crew-debriefing-for-science-1973.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-d5-apollo-17-crew-debriefing-for-science-1973.jpg","bytes":212585,"sha256":"5d7db3870de8c01a1c39b7e8a4185dd026fe132f01d1cd5ded60f10866722f7e","extracted_text_path":"extracted/nasa-007-nasa-uap-d5-apollo-17-crew-debriefing-for-science-1973.md","year":1973,"ents":{"military_units":["RAF"],"classification":[],"us_states":["Colorado"],"aircraft":[],"operations":[],"case_numbers":[],"names":["Crew Debriefing","Dick Henry","Milky Way","Gary Thomas","Charles Barthum"],"mgrs":[]}},{"id":"nasa-008-nasa-uap-d6-apollo-17-technical-crew-debriefing-1973","type":"pdf","title":"NASA-UAP-D6, Apollo 17 Technical Crew Debriefing, 1973","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1973","incident_date_inferred":"1973-01-04","incident_date_inferred_source":"body+summary","incident_date_inferred_csv_disagrees":true,"incident_location":"N/A","incident_location_inferred":"Moon","incident_location_inferred_source":"body+summary","incident_location_inferred_csv_disagrees":false,"summary":"Apollo 17 was the ninth crewed U.S. mission to the Moon, and the sixth to land Astronauts on the lunar surface. This document is an excerpt from the Apollo 17 Technical Crew Debriefing on January 4, 1973, in which astronaut Harrison Schmitt reported seeing light flashes.\n•\tPage 24-4. [Lunar Module Pilot Harrison Schmitt]: “We had light flashes just about continuously during the whole flight when we were dark adapted. I had one which I thought was a flash on the lunar surface. That one period of time when we had the blindfolds on for the ALFMED [Apollo Light Flash Moving Emulsion Detector] experiment there were just no visible flashes, although that evening, that night, before I went to sleep, I noticed that I was seeing the light flashes again.”","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-d6-apollo-17-technical-crew-debriefing-1973.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-d6-apollo-17-technical-crew-debriefing-1973.jpg","bytes":513402,"sha256":"2c874c40c55505f2348177ddde77c9fd015bf971e6e059c43508a92bc9ee6b30","extracted_text_path":"extracted/nasa-008-nasa-uap-d6-apollo-17-technical-crew-debriefing-1973.md","year":1973,"ents":{"military_units":["RAF"],"classification":[],"us_states":[],"aircraft":[],"operations":[],"case_numbers":[],"names":["Technical Crew Debriefing","Harrison Schmitt","Lunar Module Pilot","Apollo Light Flash","Moving Emulsion Detector","Policy Directive"],"mgrs":[]}},{"id":"nasa-009-nasa-uap-d7-skylab-techincal-crew-debriefing-1973","type":"pdf","title":"NASA-UAP-D7, Skylab Techincal Crew Debriefing 1973","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1973","incident_date_inferred":"1973-06-30","incident_date_inferred_source":"body+summary","incident_date_inferred_csv_disagrees":true,"incident_location":"N/A","incident_location_inferred":"Texas","incident_location_inferred_source":"body+summary","incident_location_inferred_csv_disagrees":false,"summary":"Launched on May 14, 1973, Skylab was the United States’ first laboratory in space. From 1973 to 1974, the station was visited by three crews. This document contains excerpts from all three crews to visit the station. In the first excerpt taken from Skylab 1/2 [first crew] Technical Debriefing from June 30, 1973, highlights crew observations of light flashes. The second excerpt taken from Skylab 1/3 Technical Crew Debriefing from October 4, 1973, highlights two observations—a satellite in similar orbit and another object with a “reddish hue to it.” The final excerpt taken from the Skylab 1/4 Technical Crew Debriefing from February 22, 1974, highlights an observation of flashing lights outside Skylab.\n•\tSkylab 2 crew observation: \no\tPage 23-20. [Science Pilot for Skylab 2, Joesph Kerwin] “We saw light flashes. I think all of us saw them. I saw them most often when I was in the sack at night with my eyes closed but awake naturally. They tended to wax and wane in frequency.”\n•\tSkylab 3 crew observations: \no\tPage 7-4. [Science Pilot for Skylab 3, Owen Garriott] “We saw that satellite about a week before splashdown. That was one of the most unusual things that we saw and I guess Jack [Lousma] noticed it looking out the window. This bright reddish object was out there and we tracked it for about 5 or 10 minutes. It was obviously a satellite in a very similar orbit to our own.”\no\tPage 20-1. [Science Pilot for Skylab 3, Owen Garriott] “Jack [Lousma] first noticed this rather large red star out the wardroom window. Upon close examination, it was much brighter than Jupiter or any of the other planets. It had a reddish hue to it, even though it was well above the horizon.”\n•\tSkylab 4 crew observation \no\tPage 7-8. [Commander for Skylab 4, Gerald P. Carr] “One other area of unusual events that we reported on the dump tapes was that on occasion we saw some lights flashing outside with very a definite motion relative to ours. We presumed that they were other pieces of Skylab, or possibly other satellites.”","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-d7-skylab-technical-crew-debriefing-1973.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-d7-skylab-technical-crew-debriefing-1973.jpg","bytes":659470,"sha256":"49e232c72a77f16f7e06593789a36882d614888d882a74d71eabcc7d2ce94fb6","extracted_text_path":"extracted/nasa-009-nasa-uap-d7-skylab-techincal-crew-debriefing-1973.md","year":1973,"ents":{"military_units":[],"classification":[],"us_states":["Texas"],"aircraft":[],"operations":[],"case_numbers":[],"names":["Skylab Techincal Crew","Technical Debriefing","Technical Crew Debriefing","Science Pilot","Joesph Kerwin","Owen Garriott" d5cee91d61dda66b8027ff7fbdc48d00ccd","extracted_text_path":"extracted/nasa-014-nasa-uap-vm5-apollo-12-1969.md","year":1969,"ents":{"military_units":[],"classification":[],"us_states":[],"aircraft":[],"operations":[],"case_numbers":[],"names":[],"mgrs":[]}},{"id":"nasa-015-nasa-uap-vm6-apollo-17-1972","type":"image","title":"NASA-UAP-VM6, Apollo 17, 1972","agency":"NASA","agency_raw":"NASA","release_date":"5/8/26","incident_date":"1972","incident_date_inferred":"1972","incident_date_inferred_source":"csv+summary+title","incident_date_inferred_csv_disagrees":false,"incident_location":"Moon","incident_location_inferred":"Moon","incident_location_inferred_source":"csv+summary","incident_location_inferred_csv_disagrees":false,"summary":"As part of the review of historical UAP materials under PURSUE, DOW has opened a case to investigate the accompanying NASA photograph from the Apollo 17 mission, taken December 1972. The image contains three “dots” in a triangular formation in the lower right quadrant of the lunar sky that is clearly visible upon magnification of the image. While this photo has been previously released and discussed by keen observers, there is no consensus about the nature of the anomaly. New preliminary US government analysis suggests the image feature is potentially the result of a physical object in the scene. Additionally, as part of this investigation, the government has obtained the original film from the Apollo 17 mission and the results of the full NASA and DOW analysis will be released when completed.","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/nasa-uap-vm6-apollo-17-1972.jpg","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/nasa-uap-vm6-apollo-17-1972.jpg","bytes":1778754,"sha256":"ce62e46b3535a4683ef6fd192d858be52dbbd9ca011ae1a9cb43dba947815f54","extracted_text_path":"extracted/nasa-015-nasa-uap-vm6-apollo-17-1972.md","year":1972,"ents":{"military_units":[],"classification":[],"us_states":[] e reports that the U.S. Embassy to Papua New Guinea received an inquiry from the host nation’s intelligence services regarding reports of high-altitude, high-speed aircraft in Papua New Guinean airspace on the evening of January 24, 1985. The cable refers to a representative of the local intelligence services as “NIO,” or National Intelligence Officer, throughout. The NIO relayed to U.S. diplomatic personnel that residents had been “frightened by overflights, which led to the provincial premier’s calling of a public meeting on the subject.” The NIO also stated there had been “various reports of unidentified aerial phenomena the night of January 24, including fast-moving objects with lights, contrails, and noise.” The NIO assessed these reports as credible based upon the testimony of an Air Niugini pilot who said that their radar had “picked up aircraft flying south to north at high altitude and high speed.”\nThe cable concludes by characterizing the information provided by the NIO as “very sketchy.” It also sought clarification from U.S. INDOPACOM on the presence or absence of U.S. military aircraft within Papua New Guinean airspace on the night in question.","redaction":"","source_url":"https://www.war.gov/medialink/ufo/release_1/dos-uap-d1-cable-1-papua-new-guinea-january-1985.pdf","modal_image_url":"https://www.war.gov/medialink/ufo/release_1/thumbnail/dos-uap-d1-cable-1-papua-new-guinea-january-1985.jpg","bytes":301285,"sha256":"74032ed145b1badbb1049005b4b77ba95351cb573c3cf6578a77ca25f4033220","extracted_text_path":"extracted/state-003-state-department-uap-cable-1-papua-new-guinea-january-28-198.md","year":1985,"ents":{"military_units":["INDOPACOM","DIA","NRO","NSA","CIA","RAF"],"classification":["UNCLASSIFIED"],"us_states":["HI (Hawaii)"],"aircraft":["B-52"],"operations":[],"case_numbers":[],"names":["Papua New Guinea","Port Moresby","Papua New Guinean","National Intelligence Officer","Dissemination Rule","Archive Copy"],"mgrs":[]}},{"id":"state-004-state-depar   const records = DATA.records;
  const edges = DATA.edges;
  const byId = Object.fromEntries(records.map(r => [r.id, r]));

  // Build neighbor lookup
  const neighbors = {};
  edges.forEach(e => {
    (neighbors[e.source] = neighbors[e.source] || new Set()).add(e.target);
    (neighbors[e.target] = neighbors[e.target] || new Set()).add(e.source);
  });

  // Filter state
  const filters = {
    q: "",
    agency: new Set(["DoW", "FBI", "NASA", "State"]),
    type:   new Set(["pdf", "video", "image"]),
    redact: new Set(["redact", "clean"]),
  };
  let view = "timeline";
  let selectedId = null;
  let sortKey = "id"; let sortAsc = true;

  function visible() {
    const q = filters.q.toLowerCase();
    return records.filter(r => {
      if (!filters.agency.has(r.agency)) return false;
      if (!filters.type.has(r.type)) return false;
      const isRedacted = (r.redaction || "").toUpperCase() === "TRUE";
      if (isRedacted && !filters.redact.has("redact")) return false;
      if (!isRedacted && !filters.redact.has("clean")) return false;
      if (q) {
        const hay = [
          r.id, r.title, r.summary, r.incident_location, r.incident_date,
          (r.ents.us_states || []).join(" "),
          (r.ents.military_units || []).join(" "),
          (r.ents.names || []).join(" "),
          (r.ents.case_numbers || []).join(" "),
          (r.ents.aircraft || []).join(" "),
          (r.ents.operations || []).join(" "),
        ].join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function fmtBytes(n) {
    if (!n) return "—";
    if (n < 1024) return n + " B";
    if (n < 1024*1024) return (n/1024).toFixed(0) + " KB";
    return (n/1024/1024).toFixed(1) + " MB";
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
  }

  function badge(text, cls) {
    return `<span class="badge ${cls}">${escapeHtml(text)}</span>`;
  }

  function pillList(arr, max) {
    if (!arr || !arr.length) return '<span style="color:var(--muted)">—</span>';
    const sl = arr.slice(0, max || 30);
    return sl.map(t => `<span class="pill" data-q="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join("");
  }

  // ---- Renderers ------------------------------------------------------

  function renderList(rows) {
    const view = document.getElementById("view");
    rows = rows.slice().sort((a, b) => {
      // For the incident-date column, sort by the inferred date when present.
      const key = sortKey;
      let av, bv;
      if (key === "incident_date") {
        av = a.incident_date_inferred || a.incident_date;
        bv = b.incident_date_inferred || b.incident_date;
      } else {
        av = a[key]; bv = b[key];
      }
      av = av == null ? "" : av; bv = bv == null ? "" : bv;
      if (typeof av === "number" && typeof bv === "number") {
        return sortAsc ? av - bv : bv - av;
      }
      return sortAsc ? String(av).localeCompare(String(bv)) :
                       String(bv).localeCompare(String(av));
    });

    let html = `<table class="records"><thead><tr>
      <th data-sort="id">id</th>
      <th data-sort="type">type</th>
      <th data-sort="agency">agency</th>
      <th data-sort="incident_date">incident</th>
      <th data-sort="incident_location">location</th>
      <th data-sort="title">title</th>
      <th data-sort="bytes">size</th>
    </tr></thead><tbody>`;
    rows.forEach(r => {
      const isRedacted = (r.redaction || "").toUpperCase() === "TRUE";
      html += `<tr data-id="${r.id}" class="${selectedId === r.id ? 'selected':''}">
        <td><code>${escapeHtml(r.id.length > 50 ? r.id.slice(0,50)+'…' : r.id)}</code></td>
        <td>${badge(r.type, r.type)}</td>
        <td>${badge(r.agency, "agency")}</td>
        <td class="mono">${escapeHtml(r.incident_date_inferred || r.incident_date || "—")}${r.incident_date_inferred_csv_disagrees ? '<span title="CSV value disagrees with inferred date" style="color:var(--accent2);margin-left:4px">*</span>' : ''}</td>
        <td>${escapeHtml(r.incident_location_inferred || r.incident_location || "—")}${r.incident_location_inferred_csv_disagrees ? '<span title="CSV value disagrees with inferred location" style="color:var(--accent2);margin-left:4px">*</span>' : ''}</td>
        <td>${escapeHtml(r.title)} ${isRedacted ? badge("redact", "redact") : ""}</td>
        <td class="mono">${fmtBytes(r.bytes)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    view.innerHTML = html;
    view.querySelectorAll("th[data-sort]").forEach(th => {
      th.onclick = () => {
        const k = th.dataset.sort;
        if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; }
        rerender();
      };
    });
    view.querySelectorAll("tr[data-id]").forEach(tr => {
      tr.onclick = () => selectRecord(tr.dataset.id);

  }

  function renderGraph(rows) {
    const view = document.getElementById("view");
    view.innerHTML = '<div id="graph"></div>';
    const container = document.getElementById("graph");
    const w = container.clientWidth, h = container.clientHeight;

    const visIds = new Set(rows.map(r => r.id));
    const nodes = rows.map(r => ({ id: r.id, type: r.type, agency: r.agency, title: r.title, bytes: r.bytes }));
    const visEdges = edges.filter(e => visIds.has(e.source) && visIds.has(e.target));

    const svg = d3.select(container).append("svg").attr("viewBox", `0 0 ${w} ${h}`);
    const g = svg.append("g");

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(visEdges).id(d => d.id).distance(60).strength(0.6))
      .force("charge", d3.forceManyBody().strength(-90))
      .force("center", d3.forceCenter(w/2, h/2))
      .force("collide", d3.forceCollide(8));

    const link = g.append("g").selectAll("line").data(visEdges).enter().append("line")
      .attr("class", "link");
    const node = g.append("g").selectAll("circle").data(nodes).enter().append("circle")
      .attr("class", d => `node ${d.type}`)
      .attr("r", d => Math.min(12, Math.max(3, Math.log10((d.bytes||1)+1))))
      .on("click", (ev, d) => selectRecord(d.id))
      .call(d3.drag()
        .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag",  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on("end",   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));
    node.append("title").text(d => d.title);

    sim.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      node.attr("cx", d => d.x).attr("cy", d => d.y);
    });

    svg.call(d3.zoom().scaleExtent([0.3, 5]).on("zoom", (ev) => {
      g.attr("transform", ev.transform);
    }));
  }

  function renderTimeline(rows) {
    const view = document.getElementById("view");
    const buckets = {};
    rows.forEach(r => {
      const y = r.year || "—";
      (buckets[y] = buckets[y] || []).push(r);
    });
    const years = Object.keys(buckets).sort((a, b) => {
      if (a === "—") return 1; if (b === "—") return -1;
      return Number(a) - Number(b);
    });
    let html = '<div id="timeline">';
    years.forEach(y => {
      html += `<h3>${y === "—" ? "(no incident date)" : y}  <span style="color:var(--muted);font-weight:400;font-size:11px">${buckets[y].length} records</span></h3>`;
      buckets[y].forEach(r => {
        const isRed = (r.redaction || "").toUpperCase() === "TRUE";
        html += `<div class="row ${selectedId === r.id ? 'selected':''}" data-id="${r.id}">
          <span class="year">${escapeHtml(r.incident_date_inferred || r.incident_date || "—")}</span>
          <span class="marker ${r.type}"></span>
          ${badge(r.agency, "agency")}
          <span class="title">${escapeHtml(r.title)}${isRed ? ' '+badge("redact","redact") : ''}</span>
          <span class="mono" style="color:var(--muted)">${escapeHtml(r.incident_location_inferred || r.incident_location || "")}</span>
        </div>`;
      });
    });
    html += '</div>';
    view.innerHTML = html;
    view.querySelectorAll(".row[data-id]").forEach(el => {
      el.onclick = () => selectRecord(el.dataset.id);
    });
  }

  function renderLocations(rows) {
    const view = document.getElementById("view");
    const buckets = {};
    rows.forEach(r => {
      const loc = (r.incident_location_inferred || r.incident_location || "").trim() || "Unknown";
      (buckets[loc] = buckets[loc] || []).push(r);
    });
    const locs = Object.keys(buckets).sort((a, b) => buckets[b].length - buckets[a].length);
    let html = '<div id="locations">';
    locs.forEach(loc => {
      html += `<h3>${escapeHtml(loc)} <span class="count">${buckets[loc].length} records</span></h3>`;
      buckets[loc].forEach(r => {
        html += `<div class="row" data-id="${r.id}" style="display:flex;gap:8px;padding:2px 0;cursor:pointer">
          ${badge(r.agency, "agency")} ${badge(r.type, r.type)}
          <span style="flex:1">${escapeHtml(r.title)}</span>
          <span class="mono" style="color:var(--muted)">${escapeHtml(r.incident_date_inferred || r.incident_date || "—")}</span>
        </div>`;
      });
    });
    html += '</div>';
    view.innerHTML = html;
    view.querySelectorAll(".row[data-id]").forEach(el => {
      el.onclick = () => selectRecord(el.dataset.id);
    });
  }

  function renderDetail(id) {
    const detail = document.getElementById("detail");
    if (!id) {
      detail.innerHTML = '<div class="empty">click a record to see details</div>';
      return;
    }
    const r = byId[id]; if (!r) return;
    const e = r.ents || {};
    const isRedacted = (r.redaction || "").toUpperCase() === "TRUE";
    const pairs = neighbors[id] ? Array.from(neighbors[id]) : [];

    let html = `
      <h2>${escapeHtml(r.title)}</h2>
      <div class="id mono">${escapeHtml(r.id)}</div>
      <div>
        ${badge(r.type, r.type)}
        ${badge(r.agency, "agency")}
        ${isRedacted ? badge("redact", "redact") : ''}
      </div>
      ${r.summary ? `<div class="summary">${escapeHtml(r.summary)}</div>` : ''}
      <dl class="meta-grid">
        <dt>Incident date</dt><dd class="mono">${escapeHtml(r.incident_date_inferred || r.incident_date || '—')}${r.incident_date_inferred_source ? ` <span style="color:var(--muted);font-size:11px">(${escapeHtml(r.incident_date_inferred_source)})</span>` : ''}</dd>
        ${r.incident_date_inferred_csv_disagrees ? `<dt style="color:var(--accent2)">CSV value</dt><dd class="mono" style="color:var(--accent2)">${escapeHtml(r.incident_date || '—')} <span style="font-size:11px">disagrees</span></dd>` : ''}
        <dt>Location</dt><dd>${escapeHtml(r.incident_location_inferred || r.incident_location || '—')}${r.incident_location_inferred_source ? ` <span style="color:var(--muted);font-size:11px">(${escapeHtml(r.incident_location_inferred_source)})</span>` : ''}</dd>
        ${r.incident_location_inferred_csv_disagrees ? `<dt style="color:var(--accent2)">CSV location</dt><dd style="color:var(--accent2)">${escapeHtml(r.incident_location || '—')} <span style="font-size:11px">disagrees</span></dd>` : ''}
        <dt>Release</dt><dd class="mono">${escapeHtml(r.release_date || '—')}</dd>
        <dt>Bytes</dt><dd class="mono">${fmtBytes(r.bytes)}</dd>
        <dt>SHA-256</dt><dd class="mono" style="font-size:10px;color:var(--muted)">${escapeHtml(r.sha256 || '—')}</dd>
        <dt>Source</dt><dd>${r.source_url ? `<a href="${escapeHtml(r.source_url)}" target="_blank">war.gov</a>` : '—'}</dd>
        <dt>Extracted</dt><dd>${r.extracted_text_path ? `<a href="${escapeHtml(r.extracted_text_path)}" target="_blank">${escapeHtml(r.extracted_text_path)}</a>` : '—'}</dd>
      </dl>
    `;

    if (pairs.length) {
      html += `<div class="ent-section"><h4>Cross-references</h4>`;
      pairs.forEach(pid => {
        const p = byId[pid];
        if (p) {
          html += `<div class="pill" data-goto="${escapeHtml(pid)}">${badge(p.type, p.type)} ${escapeHtml(p.title)}</div>`;
        }
      });
      html += `</div>`;
    }

    function section(label, key) {
      const arr = e[key] || [];
      if (!arr.length) return '';
      return `<div class="ent-section"><h4>${label}</h4>${pillList(arr, 30)}</div>`;
    }

    html += section("Military units", "military_units");
    html += section("Classification", "classification");
    html += section("US states", "us_states");
    html += section("Aircraft", "aircraft");
    html += section("Operations", "operations");
    html += section("Case numbers", "case_numbers");
    html += section("Coordinates (MGRS)", "mgrs");
    html += section("Names (heuristic)", "names");

    detail.innerHTML = html;
    detail.querySelectorAll("[data-goto]").forEach(el => {
      el.onclick = () => selectRecord(el.dataset.goto);
    });
    detail.querySelectorAll(".pill[data-q]").forEach(el => {
      el.onclick = () => {
        document.getElementById("q").value = el.dataset.q;
        filters.q = el.dataset.q;
        rerender();
      };
    });
  }

  function selectRecord(id) {
    selectedId = id;
    rerender();
  }

  function rerender() {
    const rows = visible();
    document.getElementById("view").classList.toggle("patterns", view === "patterns");
    document.getElementById("view").classList.toggle("globe", view === "globe");
    document.getElementById("stat-total").textContent = rows.length;
    const visIds = new Set(rows.map(r => r.id));
    const visEdges = edges.filter(e => visIds.has(e.source) && visIds.has(e.target));
    document.getElementById("stat-pairs").textContent = visEdges.length;

    if (view === "timeline") renderTimeline(rows);
    else if (view === "globe") renderGlobe(rows);
    else if (view === "patterns") renderPatterns(rows);

    renderDetail(selectedId);
  }

  async function loadWorldData() {
    if (window._worldGeo) return window._worldGeo;
    // Try same-origin first. Then a couple of public CDNs as fallback.
    const urls = [
      "./world-110m.json",
      "world-110m.json",
      "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json",
      "https://unpkg.com/world-atlas@2/countries-110m.json",
    ];
    for (const u of urls) {
      try {
        const r = await fetch(u);
        if (!r.ok) continue;
        const topo = await r.json();
        if (typeof topojson === "undefined") break;
        window._worldGeo = topojson.feature(topo, topo.objects.countries);
        return window._worldGeo;
      } catch (e) { /* try next */ }
    }
    return null;
  }

  let _pat_charts = {};

  function eraOf(yearStr) {
    if (!yearStr) return "unknown";
    const m = String(yearStr).match(/(19|20)\d{2}/);
    if (!m) {
      const m2 = String(yearStr).match(/\d{1,2}\/\d{1,2}\/(\d{2,4})/);
      if (m2) {
        let yy = parseInt(m2[1]);
        const yr = yy < 100 ? (yy >= 40 ? 1900+yy : 2000+yy) : yy;
        return eraOf(String(yr));
      }
      return "unknown";
    }
    const y = parseInt(m[0]);
    if (y < 1950) return "1940s";
    if (y < 1960) return "1950s";
    if (y < 1970) return "1960s";
    if (y < 1980) return "1970s";
    if (y < 1990) return "1980s";
    if (y < 2000) return "1990s";
    if (y < 2010) return "2000s";
    if (y < 2020) return "2010s";
    return "2020s";
  }

  function regionOf(loc) {
    if (!loc || /^n\/?a$/i.test(loc)) return "unknown";
    const L = loc.toLowerCase();
    if (/iraq|syria|kuwait|arabia|gulf|aden|persian|hormuz|middle east|mediterranean|yemen|uae|united arab|emirates/.test(L)) return "Middle East";
    if (/greece|turkey|europe|ukraine|poland|germany|france|russia/.test(L)) return "Europe";
    if (/djibouti|africa|sudan/.test(L)) return "Africa";
    if (/japan|korea|china|pacific|indo.?pacific|papua|new guinea/.test(L)) return "Asia/Pacific";
    if (/mexico|brazil|argentina|peru|chile|caribbean/.test(L)) return "Latin America";
    if (/united states|usa|u\.s\.|texas|california|arizona|nevada|new mexico|tennessee|oak ridge|western|eastern|vandenberg|afb/.test(L)) return "United States";
    if (/kazakhstan|turkmenistan|georgia|tbilisi|ashgabat/.test(L)) return "Central Asia";
    if (/orbit|moon|lunar|space/.test(L)) return "Space";
    return "Other";
  }

  function patAggregate(rows) {
    const shape = {}, behavior = {}, context = {}, era = {}, region = {}, agency = {};
    for (const r of rows) {
      const f = PATTERN_FEATURES[r.id] || { shape: [], behavior: [], context: [] };
      f.shape.forEach(s => shape[s] = (shape[s]||0)+1);
      f.behavior.forEach(b => behavior[b] = (behavior[b]||0)+1);
      f.context.forEach(c => context[c] = (context[c]||0)+1);
      const e = eraOf(r.incident_date || "");
      era[e] = (era[e]||0)+1;
      const reg = regionOf(r.incident_location || "");
      region[reg] = (region[reg]||0)+1;
      agency[r.agency] = (agency[r.agency]||0)+1;
    }
    return { shape, behavior, context, era, region, agency };
  }

  function patTopN(obj, n) {
    return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
  }

  function patBuildBar(canvas, items, color) {
    if (_pat_charts[canvas.id]) _pat_charts[canvas.id].destroy();
    _pat_charts[canvas.id] = new Chart(canvas, {
      type: "bar",
      data: { labels: items.map(x=>x[0]), datasets: [{ data: items.map(x=>x[1]),
        backgroundColor: color, borderRadius: 2 }] },
      options: {
        indexAxis: "y",
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: "#1d242b", borderColor: "#2a3440", borderWidth: 1 } },
        scales: {
          x: { ticks: { color: "#8896a3", font: { size: 10 } }, grid: { color: "#2a3440" } },
          y: { ticks: { color: "#d8dee4", font: { size: 11 } }, grid: { display: false } },
        },
        maintainAspectRatio: false, responsive: true,
      }
    });
  }

  function patBuildVBar(canvas, labels, data, color) {
    if (_pat_charts[canvas.id]) _pat_charts[canvas.id].destroy();
    _pat_charts[canvas.id] = new Chart(canvas, {
      type: "bar",
      data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 2 }] },
      options: {
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: "#1d242b", borderColor: "#2a3440", borderWidth: 1 } },
        scales: {
          x: { ticks: { color: "#d8dee4", font: { size: 10 } }, grid: { display: false } },
          y: { ticks: { color: "#8896a3", font: { size: 10 } }, grid: { color: "#2a3440" } },
        },
        maintainAspectRatio: false, responsive: true,
      }
    });
  }

  function patBuildDonut(canvas, labels, data) {
    if (_pat_charts[canvas.id]) _pat_charts[canvas.id].destroy();
    const palette = ["#4cc2ff","#ffb84c","#b385ff","#ff5c5c","#76d2a8","#e0a060","#a0a0a0","#80a0c0","#c08080","#a0c080"];
    _pat_charts[canvas.id] = new Chart(canvas, {
      type: "doughnut",
      data: { labels, datasets: [{ data, backgroundColor: palette }] },
      options: {
        plugins: { legend: { position: "bottom", labels: { color: "#d8dee4", font: { size: 10 }, boxWidth: 10 } },
          tooltip: { backgroundColor: "#1d242b", borderColor: "#2a3440", borderWidth: 1 } },
        maintainAspectRatio: false, responsive: true,
      }
    });
  }

  function renderPatterns(rows) {
    const v = document.getElementById("view");
    v.classList.add("patterns");
    if (rows.length === 0) {
      v.innerHTML = '<div class="pat-empty">No reports match the current filters.</div>';
      return;
    }

    const agg = patAggregate(rows);

    // For cross-era recurrence we always use ALL reports (it's a corpus-level claim,
    // and intersecting with filters gives nonsense for tiny cohorts).
    const allAgg = patAggregate(records);
    const oldEras = new Set(["1940s","1950s","1960s"]);
    const newEras = new Set(["2020s"]);
    const oldFeats = {}, newFeats = {};
    for (const r of records) {
      const f = PATTERN_FEATURES[r.id] || { shape: [], behavior: [], context: [] };
      const e = eraOf(r.incident_date || "");
      const all = [...f.shape.map(s=>"shape:"+s), ...f.behavior.map(b=>"behavior:"+b), ...f.context.map(c=>"context:"+c)];
      for (const k of all) {
        if (oldEras.has(e)) oldFeats[k] = (oldFeats[k]||0)+1;
        if (newEras.has(e)) newFeats[k] = (newFeats[k]||0)+1;
      }
    }
    const sharedKeys = Object.keys(oldFeats).filter(k => k in newFeats)
      .sort((a,b) => (newFeats[b]+oldFeats[b]) - (newFeats[a]+oldFeats[a]));

    // Build HTML
    const findingsHTML = PATTERN_FINDINGS.map(f => {
      const quotes = (f.quotes||[]).map(q =>
        `<div class="pat-quote">${escapeHtml(q[0])}</div><div class="pat-src">— ${escapeHtml(q[1])}</div>`
      ).join("");
      const src = f.sources ? `<div class="pat-src">${escapeHtml(f.sources)}</div>` : "";
      return `<div class="pat-finding"><h4>${escapeHtml(f.title)}</h4><p>${escapeHtml(f.body)}</p>${quotes}${src}</div>`;
    }).join("");

    const maxCross = Math.max(1, ...sharedKeys.slice(0, 18).map(k => oldFeats[k] + newFeats[k]));
    const crossHTML = '<thead><tr><th>Feature</th><th>1940s–60s</th><th>2020s</th><th>Combined</th></tr></thead><tbody>' +
      sharedKeys.slice(0, 18).map(k => {
        const sum = oldFeats[k] + newFeats[k];
        const w = Math.max(2, Math.round(sum / maxCross * 140));
        return `<tr><td>${escapeHtml(k)}</td><td>${oldFeats[k]}</td><td>${newFeats[k]}</td><td><span class="pat-bar" style="width:${w}px"></span>${sum}</td></tr>`;
      }).join("") + '</tbody>';

    v.innerHTML = `
      <div class="pat-banner">
        Showing <b>${rows.length}</b> of <b>${records.length}</b> reports (filtered).
        Distribution charts and counts update with the filter chips above.
        Findings cards and cross-era table reflect the full corpus.
      </div>

      <div class="pat-section">
        <h3>Striking patterns</h3>
        <div class="pat-findings" id="pat-findings">${findingsHTML}</div>
      </div>

      <div class="pat-section">
        <h3>Distributions (filtered)</h3>
        <div class="pat-charts">
          <div class="pat-chart"><h4>By era</h4><canvas id="pat-c-era"></canvas></div>
          <div class="pat-chart"><h4>By agency</h4><canvas id="pat-c-agency"></canvas></div>
          <div class="pat-chart"><h4>Top shapes</h4><canvas id="pat-c-shape"></canvas></div>
          <div class="pat-chart"><h4>Top behaviors</h4><canvas id="pat-c-behavior"></canvas></div>
          <div class="pat-chart"><h4>Top witness/context features</h4><canvas id="pat-c-context"></canvas></div>
          <div class="pat-chart"><h4>Region of incident</h4><canvas id="pat-c-region"></canvas></div>
        </div>
      </div>

      <div class="pat-section">
        <h3>Cross-era recurrence (full corpus)</h3>
        <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px">
          Features that appear in <b>both</b> the early FBI/DoW cohort (1940s–60s) and the modern Navy/AARO cohort (2020s).
          The top rows are the most persistent witness patterns spanning ~80 years.
        </div>
        <table class="pat-cross-era">${crossHTML}</table>
      </div>
    `;

    // Charts (after innerHTML so canvases exist)
    const ERA_ORDER = ["1940s","1950s","1960s","1970s","1980s","1990s","2000s","2010s","2020s","unknown"];
    patBuildVBar(document.getElementById("pat-c-era"),
      ERA_ORDER, ERA_ORDER.map(e => agg.era[e]||0), "#4cc2ff");
    patBuildDonut(document.getElementById("pat-c-agency"),
      Object.keys(agg.agency), Object.values(agg.agency));
    patBuildBar(document.getElementById("pat-c-shape"),    patTopN(agg.shape, 10),    "#4cc2ff");
    patBuildBar(document.getElementById("pat-c-behavior"), patTopN(agg.behavior, 10), "#ffb84c");
    patBuildBar(document.getElementById("pat-c-context"),  patTopN(agg.context, 10),  "#76d2a8");
    patBuildDonut(document.getElementById("pat-c-region"),
      Object.keys(agg.region), Object.values(agg.region));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
